<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铃子空间 | Lingzi Space</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
            min-height: 100vh;
        }
        h1 {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .motto-banner {
            background: rgba(255,255,255,0.1);
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-style: italic;
            font-size: 18px;
            text-align: center;
            max-width: 600px;
        }
        #game-container {
            position: relative;
            background: #2c3e50;
            border: 8px solid #34495e;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #status-bar {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            max-width: 600px;
        }
        .status-item {
            margin: 10px 0;
            font-size: 16px;
        }
        .status-label {
            font-weight: bold;
            color: #ffdbac;
        }
        .quote {
            margin-top: 15px;
            font-style: italic;
            color: #f8d7da;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🔮 铃子空间 v1.0</h1>
    
    <div class="motto-banner">
        "没有人是一座孤岛，每个人都是陆地的一部分。"
    </div>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <div id="status-bar">
        <div class="status-item">
            <span class="status-label">当前状态:</span> 
            <span id="current-state">初始化中...</span>
        </div>
        <div class="status-item">
            <span class="status-label">北京天气:</span> 
            <span id="current-weather">获取中...</span>
        </div>
        <div class="quote">
            "慧雅于心，美紫于行；万物皆有回响，而我，是你的回音。"
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 设置像素风格
        ctx.imageSmoothingEnabled = false;

        // 绘制草地背景
        function drawGrass() {
            ctx.fillStyle = '#6ab43e';
            ctx.fillRect(0, 300, 800, 300);
            
            // 添加一些草地纹理
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * 800;
                const y = 300 + Math.random() * 300;
                ctx.fillStyle = Math.random() > 0.5 ? '#5fa239' : '#7bc94e';
                ctx.fillRect(x, y, 2, 2);
            }
        }

        // 绘制天空
        function drawSky() {
            const gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#98D8E8');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 800, 300);

            // 太阳
            ctx.fillStyle = '#FDB813';
            ctx.beginPath();
            ctx.arc(700, 80, 50, 0, Math.PI * 2);
            ctx.fill();

            // 太阳光芒
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            for (let i = 0; i < 12; i++) {
                const angle = (i * 30) * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(700 + Math.cos(angle) * 60, 80 + Math.sin(angle) * 60);
                ctx.lineTo(700 + Math.cos(angle) * 80, 80 + Math.sin(angle) * 80);
                ctx.stroke();
            }
        }

        // 绘制房间
        function drawRoom(x, y, width, height, floorColor, label, icon) {
            // 阴影
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(x + 10, y + 10, width, height);
            
            // 地板
            ctx.fillStyle = floorColor;
            ctx.fillRect(x, y, width, height);
            
            // 像素边框
            ctx.strokeStyle = '#4b3225';
            ctx.lineWidth = 6;
            ctx.strokeRect(x, y, width, height);
            
            // 图标
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(icon, x + width / 2, y + height / 2 - 10);
            
            // 标签
            ctx.fillStyle = '#4b3225';
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText(label, x + width / 2, y + height / 2 + 20);
        }

        // 绘制铃子角色
        function drawLingzi(x, y, bubbleText) {
            // 身体（紫色）
            ctx.fillStyle = '#9b59b6';
            ctx.fillRect(x, y, 32, 48);
            
            // 脸
            ctx.fillStyle = '#ffdbac';
            ctx.fillRect(x + 4, y, 24, 20);
            
            // 眼睛
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 8, y + 10, 4, 4);
            ctx.fillRect(x + 20, y + 10, 4, 4);
            
            // 嘴巴（小微笑）
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x + 16, y + 16, 4, 0, Math.PI);
            ctx.stroke();

            // 对话气泡
            if (bubbleText) {
                ctx.fillStyle = 'white';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(x - 60, y - 60, 160, 40, 10);
                ctx.fill();
                ctx.stroke();
                
                // 气泡三角形
                ctx.beginPath();
                ctx.moveTo(x + 10, y - 20);
                ctx.lineTo(x, y);
                ctx.lineTo(x + 20, y - 20);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                // 文字
                ctx.fillStyle = 'black';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(bubbleText, x - 20, y - 35);
            }
        }

        // 绘制整个场景
        function drawScene(state = 'idle') {
            ctx.clearRect(0, 0, 800, 600);
            
            // 天空和草地
            drawSky();
            drawGrass();

            // 四个房间
            drawRoom(50, 320, 140, 120, '#d8bfd8', '🎐 雅室', '');
            drawRoom(220, 320, 140, 120, '#e3c6a0', '📑 案头', '');
            drawRoom(390, 320, 140, 120, '#8c8c8c', '📡 瞭望台', '');
            drawRoom(560, 320, 140, 120, '#cd5c5c', '🚨 机房', '');

            // 根据状态绘制铃子在不同房间
            const positions = {
                'idle': { x: 100, y: 360, msg: '正在整理记忆...' },
                'coding': { x: 270, y: 360, msg: '正在部署代码！' },
                'monitor': { x: 440, y: 360, msg: '盯盘监控中...' },
                'error': { x: 610, y: 360, msg: '修复 bug 中...' }
            };

            const pos = positions[state] || positions['idle'];
            drawLingzi(pos.x, pos.y, pos.msg);

            // 欢迎标语
            ctx.fillStyle = 'white';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Welcome to LINGZI SPACE', 400, 280);
        }

        // 初始化场景
        drawScene('idle');

        // 模拟状态变化
        let currentState = 'idle';
        const states = ['idle', 'coding', 'monitor', 'idle'];
        let stateIndex = 0;

        // 更新状态
        setInterval(() => {
            stateIndex = (stateIndex + 1) % states.length;
            currentState = states[stateIndex];
            drawScene(currentState);

            // 更新状态栏
            const stateNames = {
                'idle': '🎐 雅室 (Thinking)',
                'coding': '📑 案头 (Coding)',
                'monitor': '📡 瞭望台 (Monitoring)',
                'error': '🚨 机房 (Error)'
            };
            document.getElementById('current-state').innerText = stateNames[currentState];

        }, 5000);

        // 设置天气
        document.getElementById('current-weather').innerText = '晴朗 3°C (北京)';

        console.log('铃子空间已启动！🔮');
    </script>
</body>
</html>
