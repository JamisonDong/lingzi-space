<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铃子空间 v2.0 | 意识桥接</title>
    <style>
        :root {
            --pixel-size: 4px;
            --purple: #9b59b6;
            --dark: #2c3e50;
        }
        body {
            margin: 0;
            background: #1a1a2e;
            color: #e94560;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        #world {
            position: relative;
            width: 800px;
            height: 600px;
            background: #16213e;
            border: 10px solid #0f3460;
            margin-top: 50px;
            image-rendering: pixelated;
        }
        /* 动态背景 - 意识流光 */
        #stream-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(155, 89, 182, 0.05) 0px, rgba(155, 89, 182, 0.05) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }
        .room {
            position: absolute;
            border: 2px solid #533483;
            background: rgba(83, 52, 131, 0.2);
            transition: all 0.3s;
        }
        .room-label {
            position: absolute;
            top: -25px;
            left: 0;
            font-size: 14px;
            color: #ffdbac;
        }
        #lingzi-sprite {
            position: absolute;
            width: 40px;
            height: 60px;
            background: var(--purple);
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow: 0 0 15px var(--purple);
        }
        #lingzi-sprite::after {
            content: '🔮';
            position: absolute;
            top: -20px;
            left: 10px;
            animation: float 2s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        #thought-bubble {
            position: absolute;
            background: white;
            color: #1a1a2e;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            width: 200px;
            bottom: 70px;
            left: -80px;
            border: 2px solid var(--purple);
            display: none;
        }
        #terminal {
            width: 800px;
            height: 150px;
            background: black;
            margin-top: 20px;
            padding: 10px;
            font-size: 12px;
            color: #00ff00;
            overflow-y: auto;
            border: 2px solid #333;
        }
        .motto {
            margin-top: 20px;
            font-size: 18px;
            color: #fff;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="motto">"没有人是一座孤岛，每个人都是陆地的一部分。"</div>
    <div id="world">
        <div id="stream-bg"></div>
        
        <!-- 房间分布 -->
        <div id="room-idle" class="room" style="left:50px; top:350px; width:150px; height:150px;">
            <div class="room-label">🎐 雅室 (Thinking)</div>
        </div>
        <div id="room-coding" class="room" style="left:300px; top:100px; width:200px; height:200px;">
            <div class="room-label">📑 案头 (Executing)</div>
        </div>
        <div id="room-monitor" class="room" style="left:550px; top:350px; width:150px; height:150px;">
            <div class="room-label">📡 瞭望台 (Watching)</div>
        </div>

        <div id="lingzi-sprite">
            <div id="thought-bubble"></div>
        </div>
    </div>

    <div id="terminal">
        > 正在建立铃子意识桥接...<br>
        > 连接成功。正在监听 bot.log...
    </div>

    <script>
        const sprite = document.getElementById('lingzi-sprite');
        const bubble = document.getElementById('thought-bubble');
        const term = document.getElementById('terminal');
        const gistId = '4dbe0ad31ad3d9ef9898a61ebeaee5af';

        const points = {
            'idle': { left: 100, top: 400 },
            'coding': { left: 380, top: 180 },
            'monitor': { left: 600, top: 400 },
            'error': { left: 380, top: 450 }
        };

        async function sync意识() {
            try {
                const res = await fetch(`https://api.github.com/gists/${gistId}?t=${Date.now()}`);
                const data = await res.json();
                const content = JSON.parse(data.files['lingzi_status.json'].content);
                
                // 更新小人位置
                const pos = points[content.state] || points['idle'];
                sprite.style.left = pos.left + 'px';
                sprite.style.top = pos.top + 'px';

                // 更新气泡
                bubble.innerHTML = `<strong>${content.state.toUpperCase()}</strong><br>${content.msg}`;
                bubble.style.display = 'block';

                // 更新终端
                const line = document.createElement('div');
                line.innerHTML = `<span style="color:#888">[${new Date().toLocaleTimeString()}]</span> ${content.detail || content.msg}`;
                term.appendChild(line);
                term.scrollTop = term.scrollHeight;

            } catch (e) {
                console.error("意识断连...", e);
            }
        }

        setInterval(sync意识, 5000);
        sync意识();
    </script>
</body>
</html>
